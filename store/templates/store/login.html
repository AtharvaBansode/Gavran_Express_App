{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login| Gavran Store</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!--Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f9d423, #ffb347, #ff6a00);
        }


        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffe1e6;   /* Inner box color */
            border-radius: 15px;
        }


        @media (max-width: 576px) {
            .login-card {
                max-width: 92%;
            }
        }

        .tab-btn {
            width: 50%;
            border: none;
            padding: 10px;
            font-weight: bold;
        }

        .active-tab {
            background: #198754;
            color: white;
        }

        .hidden {
            display: none;
        }

    </style>
</head>

<body>

<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-5 rounded-4 login-card">

        <h3 class="text-center mb-3 text-success fw-bold">
            Gavran Store
        </h3>

        
      

        <!-- Tabs -->
        <div class="d-flex mb-3">
            <button class="tab-btn active-tab" id="loginTab" onclick="showLogin()">Login</button>
            <button class="tab-btn" id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <!--Messages-->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <!--Login form-->
        <div id="loginForm" style="display:block;">
            <p class="text-center text-muted mb-4">
                Log in to continue
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>


                <button type="submit" class="btn btn-success w-100">Sign In</button>
            </form>

             <p class="text-center text-muted mt-3">
                 New user?
                <a href="#" onclick="showRegister()" class="text-success fw-bold text-decoration-none">
                     Register Now
                </a>
            </p>

        </div>
        
        
        <!--Register form-->

        <div id="registerForm" style="display:none;">

            <h4 class="text-center mb-3 fw-bold">
                Create Account
            </h4>

            <p class="text-center text-muted mb-4">
                Already have an account?
                <a href="#" onclick="showLogin()" class="text-success fw-bold text-decoration-none">
                    Log in
                </a>
            </p>

            <form method="POST" action="/register/">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password1" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>
</div>

<script>
function showLogin() {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";

    document.getElementById("loginTab").classList.add("active-tab");
    document.getElementById("registerTab").classList.remove("active-tab");
}

function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";

    document.getElementById("registerTab").classList.add("active-tab");
    document.getElementById("loginTab").classList.remove("active-tab");
}
</script>

</body>
</html>
