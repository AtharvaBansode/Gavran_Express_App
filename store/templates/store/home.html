{% load static %}
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Gavran Express</title>
    <meta name="viewport" content="width=device.width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">


    <!--Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body,html{
            height: 100%;
            margin: 0;
        }



   .hero-section {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
                url("{% static 'images/gavran bg 1.png' %}") no-repeat center;
    background-size: cover;
    filter: brightness(1.2);
}


        .hero-content{
            height: 70%;
        }

    </style>
</head>


<body>

<!-- Top right login button -->
<div class="position-relative"></div>
<div class="position-absolute top-0 end-0 m-3" style="z-index: 1050;">
     <a href="{% url 'login' %}" class="btn btn-success">
        लॉगिन करा
    </a>
</div>


<div class="container-fluid hero-section">
    <div class="row hero-content align-items-center justify-content-center text-center">
        <div class="col-11 col-md-8 col-lg-6 text-white">

            <h1 class="fw-bold mb-3">गावरान एक्सप्रेस</h1>

            <p class="fs-5 mb-4">
                गावरान गहू, ज्वारी, बाजरी, तूर डाळ, मटकी यांसारखे 
                नैसर्गिक व आरोग्यदायी पदार्थ थेट तुमच्या घरापर्यंत.
            </p>

            <div class="mt-4">
                <a href="{% url 'products' %}" class="btn btn-success btn-lg me-3 px-2">
                    उत्पादने पहा
                </a>

                
            </div>
        </div>
    </div>
</div>

</body>
</html>
