<!DOCTYPE html>
<html lang="en">
<head>

    <title>Payment Failed</title>

            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #ffe6e6;
        }

        h2 {
            color: red;
        }

        p {
            font-size: 10px;
        }
